<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LSSD - Davis Detective Bureau</title>
<link rel="icon" type="image/png" href="https://i.imgur.com/kMtn1Kc.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --bg:#0a0b0d;
    --panel:#141519;
    --panel-2:#1a1c21;
    --line:rgba(255,255,255,.08);
    --accent:#4ade80;
    --accent-dim:#22a35a;
    --accent-soft:rgba(74,222,128,.12);
    --gold:#f0b429;
    --amber:#f0b429;
    --red:#f66;
    --ink:#f2f3f5;
    --ink-dim:#8b8f98;
    --disp:'Inter', ui-sans-serif, system-ui, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;
  }
  html[data-theme="light"]{
    --bg:#f5f6f8;
    --panel:#ffffff;
    --panel-2:#f7f8fa;
    --line:rgba(0,0,0,.08);
    --accent:#16a34a;
    --accent-dim:#0f8a3d;
    --accent-soft:rgba(22,163,74,.10);
    --gold:#b45309;
    --amber:#b45309;
    --red:#dc2626;
    --ink:#16181c;
    --ink-dim:#6b7280;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--disp);
    min-height:100vh;
    transition:background .15s ease, color .15s ease;
  }

  .wrap{max-width:1180px; margin:0 auto; padding:0 20px 50px;}

  /* ---------- HEADER ---------- */
  header{
    display:flex; align-items:center; gap:14px;
    padding:26px 0 20px; border-bottom:1px solid var(--line); margin-bottom:26px;
  }
  header img{width:40px; height:40px; object-fit:contain;}
  header .titles{flex:1;}
  header .titles h1{margin:0; font-size:18px; font-weight:700;}
  header .titles h1 span{color:var(--accent);}
  header .titles p{margin:2px 0 0; font-size:12px; color:var(--ink-dim);}

  .icon-btn{
    width:36px; height:36px; border-radius:8px; background:var(--panel); border:1px solid var(--line);
    color:var(--ink-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
    position:relative; transition:.15s ease;
  }
  .icon-btn:hover{color:var(--ink); border-color:var(--accent-dim);}
  .icon-btn svg{width:17px; height:17px;}

  #settingsPanel{
    position:absolute; top:56px; right:20px; width:230px; background:var(--panel);
    border:1px solid var(--line); border-radius:10px; padding:14px; display:none; z-index:20;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  #settingsPanel.open{display:block;}
  #settingsPanel h3{margin:0 0 12px; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--ink-dim); font-weight:600;}
  .theme-row{display:flex; align-items:center; justify-content:space-between;}
  .theme-row span{font-size:13px;}
  .switch{width:40px; height:22px; border-radius:20px; background:var(--panel-2); border:1px solid var(--line); position:relative; cursor:pointer;}
  .switch .knob{position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--ink-dim); transition:.15s ease;}
  .switch.on{background:var(--accent-soft); border-color:var(--accent);}
  .switch.on .knob{left:20px; background:var(--accent);}

  /* ---------- NAV / TARJETAS DE FORMATO ---------- */
  .format-grid{
    display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:14px;
    margin:26px 0 8px;
  }
  .format-card{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:20px; text-align:left; cursor:pointer; transition:.15s ease;
    display:flex; flex-direction:column; font-family:var(--disp);
  }
  .format-card:hover{border-color:var(--accent-dim); transform:translateY(-1px);}
  .format-card .fc-top{display:flex; align-items:center; justify-content:space-between;}
  .format-card .fc-ico{color:var(--ink-dim); flex-shrink:0;}
  .format-card .fc-ico svg{width:20px; height:20px;}
  .format-card .fc-arrow{color:var(--ink-dim); flex-shrink:0; transition:.15s ease;}
  .format-card .fc-arrow svg{width:17px; height:17px;}
  .format-card:hover .fc-arrow{color:var(--accent); transform:translateX(2px);}
  .format-card h3{margin:20px 0 0; font-size:15px; font-weight:700; color:var(--ink);}
  .format-card p{margin:6px 0 0; font-size:12.5px; color:var(--ink-dim); line-height:1.4;}


  /* ---------- HOME ---------- */
  #homeScreen{display:block; padding:4px 0 10px;}
  #homeScreen .welcome h2{margin:0; font-size:26px; font-weight:700;}
  #homeScreen .welcome p{margin:6px 0 0; color:var(--ink-dim); font-size:13.5px;}

  .stats-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin:26px 0 34px;}
  .stat-card{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:16px; display:flex; align-items:center; gap:12px;
  }
  .stat-card .stat-ico{
    width:38px; height:38px; border-radius:8px; background:var(--panel-2); border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; color:var(--accent); flex-shrink:0;
  }
  .stat-card .stat-ico svg{width:17px; height:17px;}
  .stat-card b{display:block; font-size:22px; font-weight:700; line-height:1;}
  .stat-card span{display:block; font-size:11.5px; color:var(--ink-dim); margin-top:5px;}

  .section-label{
    font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-dim);
    margin:0 0 14px; font-weight:600;
  }

  .roster{margin-top:36px; width:100%; text-align:left;}
  .roster-grid{display:flex; flex-wrap:wrap; justify-content:center; gap:14px;}
  .roster-grid .member-card{width:210px;}
  .member-card{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    padding:14px; display:flex; align-items:center; gap:12px; transition:.15s ease;
  }
  .member-card:hover{border-color:var(--accent-dim);}
  .member-card .avatar{
    width:40px; height:40px; border-radius:50%; flex-shrink:0;
    background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent-dim);
    display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px;
  }
  .member-card .info b{display:block; font-size:13.5px; color:var(--ink);}
  .member-card .info .rango{font-size:11.5px; color:var(--ink-dim); font-weight:500; margin-top:1px;}
  .member-card .info .meta{font-size:10.5px; color:var(--ink-dim); font-family:var(--mono); margin-top:3px;}
  .member-card .info .meta .dot{
    display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent);
    margin-right:5px; box-shadow:0 0 5px var(--accent-glow);
  }

  /* ---------- DOC SCREEN ---------- */
  #docScreen{display:none;}
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:18px; align-items:start;}
  @media (max-width:900px){ .grid{grid-template-columns:1fr;} }

  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    overflow:hidden;
  }
  .panel-head{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:12px 14px; border-bottom:1px solid var(--line);
  }
  .panel-head h2{
    font-family:var(--disp); font-size:13px;
    margin:0; color:var(--ink); flex:1; font-weight:600;
  }
  .panel-head button.reset{
    font-family:var(--disp); font-size:11.5px; color:var(--ink-dim);
    background:var(--panel-2); border:1px solid var(--line); border-radius:6px;
    padding:6px 10px; cursor:pointer;
  }
  .panel-head button.reset:hover{color:var(--red); border-color:var(--red);}
  .panel-body{padding:16px; max-height:74vh; overflow-y:auto;}

  .campo{margin-bottom:15px;}
  .campo label{
    display:block; font-family:var(--disp); font-size:12px; font-weight:500;
    color:var(--ink-dim); margin-bottom:6px;
  }
  input[type=text], textarea{
    width:100%; background:var(--panel-2); border:1px solid var(--line); border-radius:7px;
    color:var(--ink); font-family:var(--disp); font-size:13.5px; padding:9px 11px;
    outline:none; resize:vertical;
  }
  textarea{min-height:74px; line-height:1.5;}
  input[type=text]:focus, textarea:focus{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}

  fieldset.repeat{
    border:1px solid var(--line); border-radius:8px; padding:12px; margin-bottom:15px;
  }
  fieldset.repeat legend{
    font-family:var(--disp); font-size:11.5px; font-weight:600;
    color:var(--accent); padding:0 6px;
  }
  .repeat-item{
    border:1px solid var(--line); border-radius:7px; padding:11px; margin-bottom:9px;
    background:var(--panel-2); position:relative;
  }
  .repeat-item .rm{
    position:absolute; top:7px; right:7px; background:none; border:none;
    color:var(--ink-dim); cursor:pointer; font-size:13px; line-height:1; font-family:var(--disp);
  }
  .repeat-item .rm:hover{color:var(--red);}
  .repeat-item .campo{margin-bottom:9px;}
  .repeat-item .campo:last-child{margin-bottom:0;}
  .btn-add{
    font-family:var(--disp); font-size:12px; font-weight:500; color:var(--accent);
    background:var(--accent-soft); border:1px solid var(--accent-dim);
    border-radius:7px; padding:8px 12px; cursor:pointer; width:100%; letter-spacing:.01em;
  }
  .btn-add:hover{filter:brightness(1.08);}
  .btn-add::before{content:'+ ';}

  #salida{
    min-height:220px; font-family:var(--mono); font-size:12px; background:var(--panel-2);
    color:var(--ink); line-height:1.55; border-radius:7px;
  }
  .copybar{display:flex; gap:10px; margin-top:12px;}
  button.primary{
    font-family:var(--disp); font-weight:600; font-size:12.5px; letter-spacing:.01em;
    border-radius:7px; padding:9px 16px; cursor:pointer; transition:.15s ease;
    background:var(--accent); color:#06210f; border:1px solid var(--accent-dim);
  }
  button.primary:hover{filter:brightness(1.08);}
  button.primary.ok{background:var(--amber); border-color:var(--amber); color:#241900;}

  .preview{border-top:1px solid var(--line); margin-top:16px; padding-top:14px;}
  .preview h3{
    font-family:var(--disp); font-size:11px; text-transform:uppercase; letter-spacing:.08em; font-weight:600;
    color:var(--ink-dim); margin:0 0 10px;
  }
  #vista{
    font-size:13px; line-height:1.6; background:var(--panel-2); border:1px solid var(--line);
    border-radius:7px; padding:13px; color:var(--ink);
  }
  #vista b{color:var(--accent);}
  #vista table{border-collapse:collapse; width:100%; margin:8px 0;}
  #vista td, #vista th{border:1px solid var(--line); padding:6px 8px; font-size:12.5px;}
  #vista hr{border:none; border-top:1px solid var(--line); margin:10px 0;}
  #vista ul{margin:6px 0; padding-left:20px;}
  #vista details{border:1px solid var(--line); border-radius:4px; padding:6px 10px; margin:6px 0;}
  #vista summary{cursor:pointer; color:var(--accent); font-size:12px;}

  footer{
    text-align:center; color:var(--ink-dim); font-size:11px; padding-top:30px;
    letter-spacing:.03em;
  }
</style>
</head>
<body>

<div class="wrap">

  <header style="position:relative;">
    <img src="https://i.imgur.com/a495oEI.png" alt="Logo">
    <div class="titles">
      <h1>LSSD · <span>Davis Detective Bureau</span></h1>
      <p>Sistema de generación de informes</p>
    </div>
    <button class="icon-btn" id="btnSettings" title="Configuración">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
    </button>
    <div id="settingsPanel">
      <h3>Configuración</h3>
      <div class="theme-row">
        <span>Modo oscuro</span>
        <div class="switch on" id="themeSwitch"><div class="knob"></div></div>
      </div>
    </div>
  </header>

  <main>
    <div id="homeScreen">
      <div class="welcome">
        <h2>Bienvenido de nuevo</h2>
        <p>Selecciona un formato abajo para empezar a rellenarlo.</p>
      </div>

      <div class="stats-grid" id="statsGrid"></div>

      <p class="section-label">Generadores de formularios</p>
      <div class="format-grid" id="formatGrid"></div>
    </div>

    <div id="homeRoster">
      <div class="roster">
        <p class="section-label">Miembros de la división</p>
        <div class="roster-grid" id="rosterGrid"></div>
      </div>
    </div>

    <div id="docScreen">
      <div class="grid">
        <div class="panel">
          <div class="panel-head">
            <button class="reset" id="btnBackHome">← Inicio</button>
            <h2 id="formTitle">Formulario</h2>
            <button class="reset" id="btnReset">Reiniciar</button>
          </div>
          <div class="panel-body" id="formulario"></div>
        </div>

        <div class="panel" style="height:fit-content;">
          <div class="panel-head"><h2>Salida BBCode</h2></div>
          <div class="panel-body">
            <textarea id="salida" readonly spellcheck="false"></textarea>
            <div class="copybar">
              <button class="primary" id="btnCopiar">Copiar BBCode</button>
            </div>
            <div class="preview">
              <h3>Vista previa aproximada</h3>
              <div id="vista"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

</div>

<script>
/* ---------- Tema (oscuro / claro), se guarda en el navegador ---------- */
const THEME_KEY = 'lssd_theme';
function applyTheme(theme){
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeSwitch').classList.toggle('on', theme === 'dark');
  localStorage.setItem(THEME_KEY, theme);
}
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

document.getElementById('themeSwitch').addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  applyTheme(current === 'dark' ? 'light' : 'dark');
});

const settingsPanel = document.getElementById('settingsPanel');
document.getElementById('btnSettings').addEventListener('click', (e) => {
  e.stopPropagation();
  settingsPanel.classList.toggle('open');
});
document.addEventListener('click', (e) => {
  if(!settingsPanel.contains(e.target)) settingsPanel.classList.remove('open');
});

/* ---------- Miembros de la división ----------
   Edita este listado con los nombres reales de tu división.
   estado puede ser cualquier texto ("Activo", "De baja", "Suspendido"...) */
const MEMBERS = [
  { nombre:'Hamed Mahdavih',    rango:'Unit Commander',           placa:'D-001', estado:'Activo' },
  { nombre:'Vincent Sikorski',  rango:'Senior Field Detective',   placa:'D-002', estado:'Activo' }
];

function initials(name){
  return name.split(' ').map(p => p[0]).slice(0,2).join('').toUpperCase();
}

const rosterGrid = document.getElementById('rosterGrid');
MEMBERS.forEach(m => {
  const card = document.createElement('div');
  card.className = 'member-card';
  card.innerHTML =
    '<div class="avatar">' + initials(m.nombre) + '</div>' +
    '<div class="info">' +
      '<b>' + m.nombre + '</b>' +
      '<div class="rango">' + m.rango + '</div>' +
    '</div>';
  rosterGrid.appendChild(card);
});

/* ---------- Etiquetas legibles para los campos ---------- */
const LABELS = {
  detective:'Detective a cargo', supervisor:'Supervisor', oficina:'Oficina', prioridad:'Prioridad',
  fecha:'Fecha', hora:'Hora aproximada', lugar:'Ubicación', tipo:'Tipo de caso',
  num_reporte:'Número de reporte', numero_reporte:'Número de reporte',
  resumen:'Resumen', narrativa:'Narrativa', personas_involucradas:'Personas involucradas',
  evidencia:'Evidencia (texto)', linea_tiempo:'Línea de tiempo', conclusion:'Conclusión',
  notas:'Notas adicionales', archivos:'Archivos (descripción / enlaces)',
  nombre:'Nombre', rol:'Rol', estado:'Estado', delitos:'Cargos sugeridos', texto:'Descripción',
  hora_recepcion:'Hora de recepción del caso', hora_llegada:'Hora de llegada de detectives',
  hora_aseguramiento:'Hora de aseguramiento de la escena', hora_inicio:'Hora de inicio de investigación',
  analisis_detective:'Análisis del detective', conclusion_preliminar:'Conclusión preliminar',
  notas_adicionales:'Notas adicionales', motivo_actualizacion:'Motivo de la actualización',
  detalles_actualizacion:'Detalles de la actualización', observaciones:'Observaciones',
  casefile:'Número de Case File', objeto_informe:'Objeto del informe', resumen_caso:'Resumen del caso',
  analisis_investigacion:'Análisis e investigación', observaciones_finales:'Observaciones finales',
  firma_detective:'Firma del detective (nombre / placa)'
};
function label(key){ return LABELS[key] || key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

/* ---------- Las 4 plantillas ---------- */
const TEMPLATES = [

},
{
  id:'casefile',
  nombre:'Case File',
  icono:'F',
  descripcion:'Genera un nuevo caso.',
  texto:
`[divboxwhite]
[font=Times New Roman]
[center][img]https://i.imgur.com/a495oEI.png[/img][/center]
[center][b][size=150]LOS SANTOS POLICE DEPARTMENT[/size][/b][/center]

[hr]

[td][b]OFICINA:[/b] {{oficina}}[/td]

/* ---------- Motor de plantillas ---------- */
const REPEAT_RE = /\{\{REPEAT:([a-zA-Z0-9_]+)\}\}([\s\S]*?)\{\{\/REPEAT\}\}/g;
const FIELD_RE = /\{\{\s*([a-zA-Z0-9_]+)(:area)?\s*\}\}/g;

function parseSchema(texto){
  const schema = [];
  let lastIndex = 0, m;
  REPEAT_RE.lastIndex = 0;
  while((m = REPEAT_RE.exec(texto)) !== null){
    extractFields(texto.slice(lastIndex, m.index), schema);
    const key = m[1], inner = m[2];
    const subfields = [], seen = new Set();
    let sm; const subRe = new RegExp(FIELD_RE.source, 'g');
    while((sm = subRe.exec(inner)) !== null){
      if(!seen.has(sm[1])){ seen.add(sm[1]); subfields.push({key:sm[1], area: !!sm[2]}); }
    }
    schema.push({type:'repeat', key, subfields});
    lastIndex = REPEAT_RE.lastIndex;
  }
  extractFields(texto.slice(lastIndex), schema);
  return schema;
}
function extractFields(str, schema){
  const re = new RegExp(FIELD_RE.source, 'g');
  let m;
  while((m = re.exec(str)) !== null){
    schema.push({type:'field', key:m[1], area: !!m[2]});
  }
}
function render(texto, data){
  let out = texto.replace(REPEAT_RE, (full, key, inner) => {
    const items = data[key] || [];
    if(items.length === 0) return '';
    return items.map(item => inner.replace(FIELD_RE, (m2, fk) => item[fk] || '')).join('\n');
  });
  out = out.replace(FIELD_RE, (m, fk) => (typeof data[fk] === 'string' ? data[fk] : ''));
  return out;
}

/* ---------- Estado ---------- */
TEMPLATES.forEach(t => t.schema = parseSchema(t.texto));
const state = {};
function defaultData(schema){
  const d = {};
  schema.forEach(item => {
    if(item.type === 'field') d[item.key] = '';
    else {
      const blank = {}; item.subfields.forEach(sf => blank[sf.key] = '');
      d[item.key] = [blank];
    }
  });
  return d;
}
TEMPLATES.forEach(t => state[t.id] = defaultData(t.schema));

let activeId = 'home';

/* ---------- UI: navegación ---------- */
document.getElementById('btnBackHome').addEventListener('click', () => { activeId = 'home'; renderAll(); });

document.getElementById('btnReset').addEventListener('click', () => {
  const t = TEMPLATES.find(x => x.id === activeId);
  if(!t) return;
  state[activeId] = defaultData(t.schema);
  renderAll();
});

/* ---------- Estadísticas de informes generados (se guardan en el navegador) ---------- */
const STATS_KEY = 'lssd_stats';
function loadStats(){
  try{ return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }catch(e){ return {}; }
}
function saveStats(stats){ localStorage.setItem(STATS_KEY, JSON.stringify(stats)); }
function bumpStat(templateId){
  const stats = loadStats();
  stats[templateId] = (stats[templateId] || 0) + 1;
  saveStats(stats);
}
const STAT_ICONS = {
  total:'<path d="M3 3v18h18"></path><path d="m19 9-5 5-4-4-3 3"></path>',
  informe:'<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><path d="M14 2v6h6"></path>',
  casefile:'<path d="M4 20V6a2 2 0 0 1 2-2h8l6 6v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z"></path>',

  cierre:'<path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>'
};
const ARROW_ICON = '<path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path>';
function renderFormatGrid(){
  const grid = document.getElementById('formatGrid');
  grid.innerHTML = '';
  TEMPLATES.forEach(t => {
    const card = document.createElement('button');
    card.type = 'button';
    card.className = 'format-card';
    card.innerHTML =
      '<div class="fc-top">' +
        '<span class="fc-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + (STAT_ICONS[t.id] || STAT_ICONS.informe) + '</svg></span>' +
        '<span class="fc-arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + ARROW_ICON + '</svg></span>' +
      '</div>' +
      '<h3>' + t.nombre + '</h3>' +
      '<p>' + (t.descripcion || '') + '</p>';
    card.addEventListener('click', () => { activeId = t.id; renderAll(); });
    grid.appendChild(card);
  });
}
renderFormatGrid();

function renderStats(){
  const stats = loadStats();
  const total = Object.values(stats).reduce((a,b) => a+b, 0);
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = '';
  const cards = [{id:'total', label:'Informes generados', count:total}]
    .concat(TEMPLATES.map(t => ({id:t.id, label:t.nombre, count: stats[t.id] || 0})));
  cards.forEach(c => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML =
      '<div class="stat-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + (STAT_ICONS[c.id] || STAT_ICONS.informe) + '</svg></div>' +
      '<div><b>' + c.count + '</b><span>' + c.label + '</span></div>';
    grid.appendChild(card);
  });
}

const formEl = document.getElementById('formulario');
const salidaEl = document.getElementById('salida');
const vistaEl = document.getElementById('vista');
const formTitleEl = document.getElementById('formTitle');
const homeScreenEl = document.getElementById('homeScreen');
const homeRosterEl = document.getElementById('homeRoster');
const docScreenEl = document.getElementById('docScreen');

function renderAll(){
  if(activeId === 'home'){
    homeScreenEl.style.display = 'block';
    homeRosterEl.style.display = 'block';
    docScreenEl.style.display = 'none';
    renderStats();
    return;
  }

  homeScreenEl.style.display = 'none';
  homeRosterEl.style.display = 'none';
  docScreenEl.style.display = 'block';
  const t = TEMPLATES.find(x => x.id === activeId);
  formTitleEl.textContent = t.nombre;
  buildForm(t);
  updateOutput();
}

function buildForm(t){
  formEl.innerHTML = '';
  const data = state[t.id];
  t.schema.forEach(item => {
    if(item.type === 'field'){
      formEl.appendChild(buildFieldEl(item, data[item.key], val => { data[item.key] = val; updateOutput(); }));
    } else {
      formEl.appendChild(buildRepeatEl(item, data));
    }
  });
}

function buildFieldEl(item, value, onChange){
  const wrap = document.createElement('div');
  wrap.className = 'campo';
  const lab = document.createElement('label');
  lab.textContent = label(item.key);
  wrap.appendChild(lab);
  const input = document.createElement(item.area ? 'textarea' : 'input');
  if(!item.area) input.type = 'text';
  input.value = value || '';
  input.addEventListener('input', () => onChange(input.value));
  wrap.appendChild(input);
  return wrap;
}

function buildRepeatEl(item, data){
  const fs = document.createElement('fieldset');
  fs.className = 'repeat';
  const legend = document.createElement('legend');
  legend.textContent = label(item.key);
  fs.appendChild(legend);

  const itemsWrap = document.createElement('div');
  fs.appendChild(itemsWrap);

  function redrawItems(){
    itemsWrap.innerHTML = '';
    data[item.key].forEach((entry, idx) => {
      const box = document.createElement('div');
      box.className = 'repeat-item';
      if(data[item.key].length > 1){
        const rm = document.createElement('button');
        rm.className = 'rm'; rm.type = 'button'; rm.textContent = '✕';
        rm.title = 'Quitar';
        rm.addEventListener('click', () => { data[item.key].splice(idx,1); redrawItems(); updateOutput(); });
        box.appendChild(rm);
      }
      item.subfields.forEach(sf => {
        box.appendChild(buildFieldEl(sf, entry[sf.key], val => { entry[sf.key] = val; updateOutput(); }));
      });
      itemsWrap.appendChild(box);
    });
  }
  redrawItems();

  const addBtn = document.createElement('button');
  addBtn.type = 'button'; addBtn.className = 'btn-add';
  addBtn.textContent = 'Añadir ' + label(item.key).toLowerCase();
  addBtn.addEventListener('click', () => {
    const blank = {}; item.subfields.forEach(sf => blank[sf.key] = '');
    data[item.key].push(blank);
    redrawItems(); updateOutput();
  });
  fs.appendChild(addBtn);
  return fs;
}

function updateOutput(){
  const t = TEMPLATES.find(x => x.id === activeId);
  if(!t) return;
  const texto = render(t.texto, state[t.id]);
  salidaEl.value = texto;
  renderPreview(texto);
}

/* ---------- Vista previa aproximada ---------- */
function renderPreview(bbcode){
  let html = bbcode.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  html = html
    .replace(/\[divboxwhite\]/gi,'<div style="border:1px solid var(--line);border-radius:6px;padding:10px;">')
    .replace(/\[\/divboxwhite\]/gi,'</div>')
    .replace(/\[font=[^\]]*\]/gi,'').replace(/\[\/font\]/gi,'')
    .replace(/\[spoiler=([^\]]*)\]/gi,'<details><summary>$1</summary>')
    .replace(/\[\/spoiler\]/gi,'</details>')
    .replace(/\[table\]/gi,'<table>').replace(/\[\/table\]/gi,'</table>')
    .replace(/\[tr\]/gi,'<tr>').replace(/\[\/tr\]/gi,'</tr>')
    .replace(/\[th\]/gi,'<th>').replace(/\[\/th\]/gi,'</th>')
    .replace(/\[td\]/gi,'<td>').replace(/\[\/td\]/gi,'</td>')
    .replace(/\[list\]/gi,'<ul>').replace(/\[\/list\]/gi,'</ul>')
    .replace(/^\[\*\](.*)$/gim,'<li>$1</li>')
    .replace(/\[indent\]/gi,'<div style="margin-left:18px">').replace(/\[\/indent\]/gi,'</div>')
    .replace(/\[center\]([\s\S]*?)\[\/center\]/gi,'<div style="text-align:center">$1</div>')
    .replace(/\[size=\d+\]([\s\S]*?)\[\/size\]/gi,'<span style="font-size:1.15em">$1</span>')
    .replace(/\[color=([^\]]+)\]([\s\S]*?)\[\/color\]/gi,'<span style="color:$1">$2</span>')
    .replace(/\[b\]([\s\S]*?)\[\/b\]/gi,'<b>$1</b>')
    .replace(/\[i\]([\s\S]*?)\[\/i\]/gi,'<i>$1</i>')
    .replace(/\[hr\]/gi,'<hr>')
    .replace(/\[img\]([\s\S]*?)\[\/img\]/gi,'<img src="$1" style="max-width:100%;border-radius:4px" alt="">')
    .replace(/\n/g,'<br>');
  vistaEl.innerHTML = html;
}

/* ---------- Copiar ---------- */
document.getElementById('btnCopiar').addEventListener('click', async () => {
  const btn = document.getElementById('btnCopiar');
  bumpStat(activeId);
  try{
    await navigator.clipboard.writeText(salidaEl.value);
  }catch(e){
    salidaEl.select(); document.execCommand('copy');
  }
  btn.textContent = '¡Copiado!'; btn.classList.add('ok');
  setTimeout(() => { btn.textContent = 'Copiar BBCode'; btn.classList.remove('ok'); }, 1400);
});

renderAll();
